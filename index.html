}

function showSection(idx) {
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.section').forEach((s, i) => {
    s.classList.toggle('visible', i === idx);
  });
}

function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = SECTIONS.map((s, si) => {
    const exHtml = s.exercises.map((e, ei) => renderExercise(e, si, ei)).join('');
    return `<div class="section${si === 0 ? ' visible' : ''}" id="sec-${si}">
      <div class="sec-title">${s.title}</div>
      <div class="sec-sub">${s.sub}</div>
      ${exHtml}
    </div>`;
  }).join('');
}

function renderExercise(e, si, ei) {
  const id = `ex-${si}-${ei}`;
  let body = '';
  if (e.type === 'vf') {
    body = `<div class="ex-desc">${e.desc}</div>
      <div class="vf-options">
        <button class="vf-btn" onclick="answerVF('${id}',${si},${ei},true)">Verdadero</button>
        <button class="vf-btn" onclick="answerVF('${id}',${si},${ei},false)">Falso</button>
      </div>`;
  } else if (e.type === 'select') {
    body = `<div class="ex-desc">${e.desc}</div>
      <div class="vf-options">${e.options.map((o, oi) =>
        `<button class="vf-btn" onclick="answerSelect('${id}',${si},${ei},${oi})">${o}</button>`
      ).join('')}</div>`;
  } else if (e.type === 'calc') {
    body = `<div class="ex-desc">${e.desc}</div>
      <div class="ex-data">${e.data}</div>
      ${e.fields.map(f => `<div class="field-row">
        <span class="field-label">${f.label}</span>
        <input class="field-input" type="number" step="any" id="${id}-${f.key}" placeholder="...">
        <span class="field-unit">${f.unit}</span>
      </div>`).join('')}
      <button class="check-btn" onclick="checkCalc('${id}',${si},${ei})">Verificar</button>
      ${e.hint ? `<button class="hint-btn" onclick="toggleHint('${id}')">Ver pista</button><div class="hint-text" id="${id}-hint">${e.hint}</div>` : ''}`;
  }
  return `<div class="exercise" id="${id}">
    <div class="ex-title">${e.title}</div>
    ${body}
    <div class="feedback" id="${id}-fb"></div>
  </div>`;
}

function answerVF(id, si, ei, val) {
  const e = SECTIONS[si].exercises[ei];
  const key = SECTIONS[si].id + '_' + ei;
  if (scores[key] !== null) return;
  const btns = document.querySelectorAll(`#${id} .vf-btn`);
  const correct = val === e.answer;
  btns.forEach(b => {
    const bVal = b.textContent === 'Verdadero';
    if (bVal === e.answer) b.classList.add('correct-answer');
    else if (bVal === val && !correct) b.classList.add('wrong-answer');
    b.classList.add('selected');
  });
  scores[key] = correct;
  if (correct) earnedPoints++;
  showFeedback(id, correct, e.explanation);
  updateScore();
}

function answerSelect(id, si, ei, oi) {
  const e = SECTIONS[si].exercises[ei];
  const key = SECTIONS[si].id + '_' + ei;
  if (scores[key] !== null) return;
  const btns = document.querySelectorAll(`#${id} .vf-btn`);
  const correct = oi === e.answer;
  btns.forEach((b, i) => {
    if (i === e.answer) b.classList.add('correct-answer');
    else if (i === oi && !correct) b.classList.add('wrong-answer');
  });
  scores[key] = correct;
  if (correct) earnedPoints++;
  showFeedback(id, correct, e.explanation);
  updateScore();
}

function checkCalc(id, si, ei) {
  const e = SECTIONS[si].exercises[ei];
  const key = SECTIONS[si].id + '_' + ei;
  if (scores[key] !== null) return;
  let allCorrect = true;
  let anyFilled = false;
  let details = [];
  e.fields.forEach(f => {
    const input = document.getElementById(`${id}-${f.key}`);
    const val = parseFloat(input.value);
    if (isNaN(val)) { allCorrect = false; return; }
    anyFilled = true;
    const diff = Math.abs(val - f.answer);
    if (diff <= f.tolerance) {
      input.style.borderColor = '#639922';
      input.style.background = '#EAF3DE';
    } else {
      input.style.borderColor = '#E24B4A';
      input.style.background = '#FCEBEB';
      allCorrect = false;
      details.push(`${f.label}: la respuesta correcta es ${f.unit === '$' ? '$' : ''}${f.answer.toLocaleString('es-AR', {minimumFractionDigits: f.answer % 1 ? 2 : 0})}${f.unit === '%' ? '%' : f.unit === 'uds' ? ' uds' : ''}`);
    }
  });
  if (!anyFilled) return;
  scores[key] = allCorrect;
  if (allCorrect) earnedPoints++;
  const msg = allCorrect
    ? 'Excelente! Todos los calculos son correctos.'
    : 'Revisa los campos marcados en rojo. ' + details.join('. ') + '.';
  showFeedback(id, allCorrect, msg);
  updateScore();
}

function showFeedback(id, correct, msg) {
  const fb = document.getElementById(`${id}-fb`);
  fb.className = `feedback ${correct ? 'correct' : 'wrong'}`;
  fb.innerHTML = (correct ? '&#10004; ' : '&#10008; ') + msg;
}

function toggleHint(id) {
  const h = document.getElementById(`${id}-hint`);
  h.style.display = h.style.display === 'block' ? 'none' : 'block';
}

function updateScore() {
  const answered = Object.values(scores).filter(v => v !== null).length;
  document.getElementById('score').textContent = `${earnedPoints}/${totalPoints}`;
  document.getElementById('score-bar').style.width = `${(earnedPoints / totalPoints) * 100}%`;
  SECTIONS.forEach((s, si) => {
    const sectionScores = s.exercises.map((_, ei) => scores[s.id + '_' + ei]);
    const allDone = sectionScores.every(v => v !== null);
    const allCorrect = sectionScores.every(v => v === true);
    const btn = document.getElementById(`nav-${si}`);
    if (allDone && allCorrect) btn.classList.add('done');
  });
  if (answered === totalPoints) {
    const pct = Math.round((earnedPoints / totalPoints) * 100);
    let emoji = pct >= 80 ? '&#127942;' : pct >= 50 ? '&#128170;' : '&#128218;';
    let msg = pct >= 80 ? 'Felicitaciones, dominas la construccion de precios!' : pct >= 50 ? 'Buen trabajo! Segui practicando los temas con errores.' : 'Te recomendamos repasar la Unidad 4 del manual y volver a intentar.';
    const container = document.getElementById('sections');
    container.innerHTML += `<div class="congrats">
      <div class="congrats-icon">${emoji}</div>
      <div class="congrats-title">Resultado: ${earnedPoints} de ${totalPoints} (${pct}%)</div>
      <div class="congrats-sub">${msg}</div>
    </div>`;
  }
}

renderNav();
renderSections();
</script>
